services:
  nova-hub:
    build: .
    container_name: nova-hub
    restart: always
    ports:
      - "8080:8080"
    cap_add:
      - NET_RAW
      - NET_ADMIN
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - ./config.local.json:/app/config.local.json:ro
    environment:
      - TZ=America/Mexico_City
    healthcheck:
      test: python3 -c "import urllib.request; exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/api/health', timeout=5).status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
