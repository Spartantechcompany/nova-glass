services:
  nova-hub:
    build:
      context: .
      dockerfile: Dockerfile
    image: nova-glass-nova-hub:${TAG:-latest}
    container_name: nova-hub
    restart: always
    ports:
      - "${HUB_PORT:-8080}:8080"
    cap_add:
      - NET_RAW
      - NET_ADMIN
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${DATA_DIR:-./data}:/app/data
    environment:
      - TZ=${TZ:-America/Mexico_City}
    healthcheck:
      test: python3 -c "import urllib.request; exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/api/health', timeout=5).status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
