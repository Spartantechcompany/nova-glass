name: Deploy NOVA Glass

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, spark01]
    concurrency: deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync code to deployment directory
        run: |
          rsync -av --delete \
            --exclude='.git/' --exclude='config.local.*' \
            --exclude='data/' --exclude='*.log' --exclude='__pycache__/' \
            $GITHUB_WORKSPACE/ /home/nvidia/nova-glass/

      - name: Build and deploy with Docker
        run: |
          cd /home/nvidia/nova-glass
          docker compose build --pull
          docker compose up -d

      - name: Verify deployment
        run: |
          sleep 3
          echo "=== Container status ==="
          docker ps --filter name=nova-hub --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          echo ""
          echo "=== Health check ==="
          curl -sf http://127.0.0.1:8080/api/health && echo " OK" || echo " FAILED"
